name: E2E Extended

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  extended:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_SMOKE_USER_EMAIL: smoke@e2e.local
      E2E_SMOKE_USER_PASSWORD: Smoke1234!
      E2E_USER_A_EMAIL: user-a@e2e.local
      E2E_USER_A_PASSWORD: MatchA1234!
      E2E_USER_B_EMAIL: user-b@e2e.local
      E2E_USER_B_PASSWORD: MatchB1234!
      E2E_USER_C_EMAIL: user-c@e2e.local
      E2E_USER_C_PASSWORD: MatchC1234!
      E2E_BASE_URL: https://localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: make up-bg

      - name: Seed deterministic E2E fixtures
        run: make seed-e2e-users

      - name: Run extended suite
        run: make test-e2e-suite SUITE=extended

      - name: Stop stack
        if: always()
        run: make down
