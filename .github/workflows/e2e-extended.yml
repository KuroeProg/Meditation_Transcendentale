name: E2E Extended

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  extended:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_SMOKE_USER_EMAIL: smoke@e2e.local
      E2E_SMOKE_USER_PASSWORD: Smoke1234!
      E2E_USER_A_EMAIL: user-a@e2e.local
      E2E_USER_A_PASSWORD: MatchA1234!
      E2E_USER_B_EMAIL: user-b@e2e.local
      E2E_USER_B_PASSWORD: MatchB1234!
      E2E_USER_C_EMAIL: user-c@e2e.local
      E2E_USER_C_PASSWORD: MatchC1234!
      E2E_BASE_URL: https://localhost
      E2E_RETRIES: '2'
      E2E_TRACE: 'on-first-retry'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: cp transcendence/.env.example transcendence/.env

      - name: Start stack
        run: make up-bg

      - name: Apply database migrations
        run: make migrations

      - name: Seed deterministic E2E fixtures
        run: make seed-e2e-users

      - name: Install frontend E2E dependencies
        run: |
          cd transcendence/frontend/interface
          sudo chown -R "$USER":"$USER" .
          rm -rf node_modules
          npm ci
          npx playwright install --with-deps chromium

      - name: Run extended suite
        run: make test-e2e-suite SUITE=extended

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-extended-artifacts
          path: |
            transcendence/frontend/interface/test-results
            transcendence/frontend/interface/playwright-report
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: make down
