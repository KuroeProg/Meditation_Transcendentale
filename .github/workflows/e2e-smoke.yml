name: E2E Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      E2E_SMOKE_USER_EMAIL: smoke@e2e.local
      E2E_SMOKE_USER_PASSWORD: Smoke1234!
      E2E_USER_A_EMAIL: user-a@e2e.local
      E2E_USER_A_PASSWORD: MatchA1234!
      E2E_USER_B_EMAIL: user-b@e2e.local
      E2E_USER_B_PASSWORD: MatchB1234!
      E2E_USER_C_EMAIL: user-c@e2e.local
      E2E_USER_C_PASSWORD: MatchC1234!
      E2E_BASE_URL: https://localhost
      E2E_RETRIES: '0'
      E2E_TRACE: 'retain-on-failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: cp transcendence/.env.example transcendence/.env

      - name: Start stack
        run: make up-bg

      - name: Wait for Nginx to be healthy
        run: |
          echo "Waiting for Nginx to respond on https://localhost..."
          for i in {1..30}; do
            if curl -k -s https://localhost/ > /dev/null; then
              echo "Nginx is UP!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Nginx failed to start in time. Printing logs:"
          docker compose logs nginx
          exit 1

      - name: Apply database migrations
        run: make migrations

      - name: Seed deterministic E2E fixtures
        run: make seed-e2e-users

      - name: Install frontend E2E dependencies
        run: |
          cd transcendence/frontend/interface
          sudo chown -R "$USER":"$USER" .
          rm -rf node_modules
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: make test-e2e-suite SUITE=smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            transcendence/frontend/interface/test-results
            transcendence/frontend/interface/playwright-report
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: make down
