name: E2E Critical

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  release:
    types: [prereleased]
  workflow_dispatch:

jobs:
  critical:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        (
          contains(join(github.event.pull_request.labels.*.name, ','), 'e2e-critical') ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'risk:high')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      E2E_SMOKE_USER_EMAIL: smoke@e2e.local
      E2E_SMOKE_USER_PASSWORD: Smoke1234!
      E2E_USER_A_EMAIL: user-a@e2e.local
      E2E_USER_A_PASSWORD: MatchA1234!
      E2E_USER_B_EMAIL: user-b@e2e.local
      E2E_USER_B_PASSWORD: MatchB1234!
      E2E_USER_C_EMAIL: user-c@e2e.local
      E2E_USER_C_PASSWORD: MatchC1234!
      E2E_BASE_URL: https://localhost
      E2E_RETRIES: '1'
      E2E_TRACE: 'on-first-retry'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: cp transcendence/.env.example transcendence/.env

      - name: Start stack
        run: make up-bg

      - name: Apply database migrations
        run: make migrations

      - name: Seed deterministic E2E fixtures
        run: make seed-e2e-users

      - name: Install frontend E2E dependencies
        run: |
          cd transcendence/frontend/interface
          sudo chown -R "$USER":"$USER" .
          rm -rf node_modules
          npm ci
          npx playwright install --with-deps chromium

      - name: Run critical suite
        run: make test-e2e-suite SUITE=critical

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-critical-artifacts
          path: |
            transcendence/frontend/interface/test-results
            transcendence/frontend/interface/playwright-report
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: make down
