version: '3.8'

networks:
  frontend_net:
  backend_net:
  monitor_net:

services:
  # bdd
  db:
    image: postgres:15
    container_name: transcendence_db
    volumes:
      - ./database/data:/var/lib/postgresql/data
    env_file: .env # Les secrets ne sont pas sur Git 
    restart: always
    networks:
      - backend_net

  # Adil - fastapi / backend
  backend:
    build: ./backend
    container_name: transcendence_back
    depends_on:
      - db
    env_file: .env
    restart: always
    networks:
      - frontend_net
      - backend_net

  # Alexis - frontend
  frontend:
    build: ./frontend
    container_name: transcendence_front
    restart: always
    networks:
      - frontend_net

  # Cloé - Cyber
  nginx:
    build: ./nginx
    container_name: transcendence_nginx
    ports:
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - frontend_net
      - monitor_net

  # Cloe - Monitoring
  prometheus:
    image: prom/prometheus
    container_name: transcendence_prom
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://localhost/prometheus'
    networks:
      - monitor_net
      - backend_net
  
  node_exporter:
    image: prom/node-exporter:latest
    container_name: transcendence_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - monitor_net
    restart: always

  grafana:
    image: grafana/grafana
    container_name: transcendence_grafana
    # deleted port for security reason
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: always
    networks:
      - monitor_net

# Théo/Mileum - Log Management
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: transcendence_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # À activer plus tard (cyber)
    restart: always
    networks:
      - monitor_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: transcendence_kibana
    environment:
      - SERVER_BASEPATH="/kibana"
      - SERVER_REWRITEBASEPATH="true"
    depends_on:
      - elasticsearch
    restart: always
    # On expose pas le port 5601 sur le net on passe par le 443
    networks:
      - monitor_net

volumes:
  grafana_data: