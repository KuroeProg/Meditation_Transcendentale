# removed version (because Warning)

# Limite la taille des logs Docker (évite des fichiers json géants sur le disque)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

networks:
  frontend_net:
  backend_net:
  monitor_net:

services:
  # bdd
  db:
    image: postgres:15
    container_name: transcendence_db
    volumes:
      - ./database/data:/var/lib/postgresql/data
    env_file: .env # Les secrets ne sont pas sur Git 
    restart: always
    logging: *default-logging
    networks:
      - backend_net

  vault:
    image: hashicorp/vault:latest
    container_name: vault_server
    restart: always
    ports:
      - "8202:8202"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8202
    cap_add:
      - IPC_LOCK
    logging: *default-logging
    networks:
      - monitor_net

  redis:
    image: redis:7-alpine
    container_name: redis_broker
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    logging: *default-logging
    networks:
      - backend_net

  backend:
    build: ./backend
    container_name: transcendence_back
    volumes:
      - ./backend:/app
      - shared_assets:/app/shared_plots:ro
    environment:
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - backend_net
    restart: always
    logging: *default-logging

  worker:
    build: ./data_script
    command: celery -A tasks_config worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./data_script:/app
      - shared_assets:/app/shared_plots:ro
    logging: *default-logging
    networks:
      - backend_net

  # Alexis - frontend
  frontend:
    build: ./frontend
    container_name: transcendence_front
    volumes:
      - ./frontend:/app
      - /app/interface/node_modules
    environment:
      - VITE_PORT=5173
      # HMR via https://localhost (nginx) — sans ça, le hot-reload vise :5173 depuis le navigateur
      - VITE_HMR_NGINX=1
    ports:
      # Test direct sans nginx : http://localhost:5173 (si 502 sur :443, vérifie ici d’abord)
      - "5173:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: always
    logging: *default-logging
    networks:
      - backend_net

  # Cloé - Cyber
  nginx:
    build: ./nginx
    container_name: transcendence_nginx
    environment:
      - SEC_RULE_ENGINE=On
      - SEC_PRINTERRORLOGS=On
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:443/"]
      interval: 10s
      timeout: 5s
      retries: 3
      # start_period: 30s
    ports:
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./logs/nginx:/var/log/nginx
      # Dossier template pour ne pas effacer notre fichier de config
      - ./nginx/conf.d/default.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # .htpasswd pour prometheus
      - ./nginx/conf.d/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
    restart: always
    logging: *default-logging
    networks:
      - frontend_net
      - monitor_net
      - backend_net

  # Cloe - Monitoring
  prometheus:
    image: prom/prometheus
    container_name: transcendence_prom
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://localhost/prometheus'
    logging: *default-logging
    networks:
      - monitor_net
      - backend_net
  
  node_exporter:
    image: prom/node-exporter:latest
    container_name: transcendence_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    logging: *default-logging
    networks:
      - monitor_net
    restart: always

  grafana:
    image: grafana/grafana
    container_name: transcendence_grafana
    # deleted port for security reason
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: always
    logging: *default-logging
    networks:
      - monitor_net

# Théo/Mileum - Log Management
  elasticsearch:
    build: ./elasticsearch
    container_name: elasticsearch
    env_file: .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch.key
    volumes:
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
      - elastic_data:/usr/share/elasticsearch/data
    restart: always
    logging: *default-logging
    networks:
      - monitor_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    env_file: .env
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200/
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD} # Defined in your .env
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none # Since you use self-signed certs
      - SERVER_BASEPATH="/kibana"
      - SERVER_REWRITEBASEPATH="true"
    depends_on:
      - elasticsearch
    restart: always
    logging: *default-logging
    # On expose pas le port 5601 sur le net on passe par le 443
    networks:
      - monitor_net

  logstash:
    build: ./logstash
    container_name: logstash
    env_file: .env
    volumes:
      - ./certs:/usr/share/logstash/config/certs
      - ./logs/nginx:/var/log/nginx:ro
    environment:
      - MONITORING_ENABLED=false
      - XPACK_MONITORING_ENABLED=false
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
    depends_on:
      - elasticsearch
    logging: *default-logging
    networks:
      - monitor_net
      - backend_net
    restart: always
volumes:
  grafana_data:
  elastic_data:
  redis_data:
  shared_assets:
  vault-data: