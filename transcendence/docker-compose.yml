# removed version (because Warning)

# Limite la taille des logs Docker (évite des fichiers json géants sur le disque)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

networks:
  frontend_net:
  backend_net:
  monitor_net:

services:
  # bdd
  db:
    image: postgres:15
    container_name: transcendence_db
    volumes:
      - ./database/data:/var/lib/postgresql/data
    env_file: .env # Les secrets ne sont pas sur Git 
    restart: always
    logging: *default-logging
    networks:
      - backend_net
    healthcheck:
      # Vérifie que le serveur accepte les connexions TCP (sans dépendre du shell / des $$ compose)
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 45s

  # vault:
  #   image: hashicorp/vault:latest
  #   container_name: vault_server
  #   restart: always
  #   ports:
  #     - "127.0.0.1:8202:8202"
  #   environment:
  #     - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN}
  #     - VAULT_LOCAL_CONFIG='{"listener":[{"tcp":{"address":"0.0.0.0:8202","tls_disable":0,"tls_cert_file":"/vault/certs/nginx.crt","tls_key_file":"/vault/certs/nginx.key"}}], "disable_mlock": true}'
  #   # cap_add:
  #   #   - IPC_LOCK
  #   #   - SETFCAP
  #   logging: *default-logging
  #   networks:
  #     monitor_net :
  #         aliases:
  #           - vault
  #   volumes:
  #     - ./nginx/certs:/vault/certs

  vault:
    image: hashicorp/vault:latest
    container_name: vault_server
    restart: always
    ports:
      - "127.0.0.1:8202:8202"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      SKIP_SETCAP: "true"
      VAULT_LOCAL_CONFIG: >
        {
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8202",
              "tls_disable": 0,
              "tls_cert_file": "/vault/certs/nginx.crt",
              "tls_key_file": "/vault/certs/nginx.key"
            }
          }],
          "disable_mlock": true
        }
    logging: *default-logging
    networks:
      monitor_net:
        aliases:
          - vault
    volumes:
      - ./nginx/certs:/vault/certs
  
  vault-init:
    image: hashicorp/vault:latest
    container_name: vault_init
    depends_on:
      - vault
    env_file: .env
    environment:
      - VAULT_ADDR=https://vault:8202
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
      - VAULT_SKIP_VERIFY=true
    command: >
      sh -c "
      sleep 5;
      vault kv put secret/database db_user=\"$${POSTGRES_USER}\" db_password=\"$${POSTGRES_PASSWORD}\" db_name=\"$${POSTGRES_DB}\" redis_pass=\"$${REDIS_PASSWORD}\" ft_client=\"$${FORTYTWO_CLIENT_ID}\" ft_secret=\"$${FORTYTWO_CLIENT_SECRET}\" email_pass=\"$${EMAIL_HOST_PASSWORD}\";
      echo 'Secrets are now in vault !';
      "
    networks:
      - monitor_net

  redis:
    image: redis:7-alpine
    container_name: redis_broker
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    logging: *default-logging
    networks:
      - backend_net

  backend:
    build: ./backend
    container_name: transcendence_back
    volumes:
      - ./backend:/app
      - shared_assets:/app/shared_plots:ro
      - ./nginx/certs:/app/certs:ro
    environment:
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FORTYTWO_CLIENT_ID=${FORTYTWO_CLIENT_ID}
      - FORTYTWO_CLIENT_SECRET=${FORTYTWO_CLIENT_SECRET}
      - FORTYTWO_REDIRECT_URI=${FORTYTWO_REDIRECT_URI}
      - FRONTEND_DASHBOARD_URL=${FRONTEND_DASHBOARD_URL}
      - APP_ORIGIN=${APP_ORIGIN}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@transcendence.local}
      - EMAIL_HOST=${EMAIL_HOST:-mailhog}
      - EMAIL_PORT=${EMAIL_PORT:-1025}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - VAULT_ADDR=https://vault:8202
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
    # ports:
    # A voir avec Cloe
      # - "8000:8000"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    networks:
      - backend_net
      - monitor_net
    restart: always
    logging: *default-logging

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: transcendence_mailhog
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - backend_net
      - monitor_net
    restart: always
    logging: *default-logging

  worker:
    build: ./data_script
    command: celery -A tasks_config worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./data_script:/app
      - shared_assets:/app/shared_plots:ro
    logging: *default-logging
    networks:
      - backend_net

  # Alexis - frontend
  frontend:
    build: ./frontend
    container_name: transcendence_front
    volumes:
      - ./frontend:/app
      - /app/interface/node_modules
    environment:
      - VITE_PORT=5173
      - VITE_APP_ORIGIN=${APP_ORIGIN}
      - VITE_API_ORIGIN=${VITE_API_ORIGIN}
      - VITE_WS_ORIGIN=${VITE_WS_ORIGIN}
      # HMR via https://localhost (nginx) — sans ça, le hot-reload vise :5173 depuis le navigateur
      - VITE_HMR_NGINX=1
      - VITE_HMR_HOST=${VITE_HMR_HOST:-localhost}
      # Dans Docker, le proxy /api du dev server doit viser nginx (pas 127.0.0.1 du conteneur)
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET:-https://nginx:443}
    # ports:
      # Test direct sans nginx : http://localhost:5173 (si 502 sur :443, vérifie ici d’abord)
      # - "5173:5173"
    expose:
      - "5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: always
    logging: *default-logging
    networks:
      - backend_net

  # Cloé - Cyber
  nginx:
    build: ./nginx
    container_name: transcendence_nginx
    environment:
      - SEC_RULE_ENGINE=On
      - SEC_PRINTERRORLOGS=On
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-localhost}
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:443/"]
      interval: 10s
      timeout: 5s
      retries: 3
      # start_period: 30s
    ports:
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./logs/nginx:/var/log/nginx
      # Dossier template pour ne pas effacer notre fichier de config
      - ./nginx/conf.d/default.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # .htpasswd pour prometheus
      - ./nginx/conf.d/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
    restart: always
    logging: *default-logging
    networks:
      - frontend_net
      - monitor_net
      - backend_net

  # Cloe - Monitoring
  prometheus:
    image: prom/prometheus
    container_name: transcendence_prom
    # ports:
    #   - "127.0.0.1:9090:9090" #127.0.0.1 
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml # alerts_rules.yml is now visible for prometheus.
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://localhost/prometheus'
    logging: *default-logging
    networks:
      - monitor_net
      - backend_net
    # voir pour recevoir un email si alerte (?)
    # voir pour passer par un autre port pour le côté site et administration

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: transcendence_nginx_exporter
    command: 
      - "--nginx.scrape-uri=http://nginx:80/statut" # On passe par le port 80 (Interne)
    restart: always
    logging: *default-logging
    networks:
      - monitor_net
      - frontend_net
    
  node_exporter:
    image: prom/node-exporter:latest
    container_name: transcendence_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    logging: *default-logging
    networks:
      - monitor_net
    restart: always

  grafana:
    image: grafana/grafana
    container_name: transcendence_grafana
    # deleted port for security reason
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mailhog:1025
      - GF_SMTP_SKIP_VERIFY=true
      - GF_SMTP_FROM_ADDRESS=alertes@transcendence.com
      - GF_SMTP_FROM_NAME=Grafana
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: always
    logging: *default-logging
    networks:
      - monitor_net

# Théo/Mileum - Log Management
  elasticsearch:
    build: ./elasticsearch
    container_name: elasticsearch
    env_file: .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - ES_JAVA_OPTS=-Xms384m -Xmx384m
      - xpack.ml.enabled=false # Désactive le Machine Learning (très lourd !!)
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch.key
    volumes:
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
      - elastic_data:/usr/share/elasticsearch/data
    restart: always
    logging: *default-logging
    networks:
      - monitor_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    env_file: .env
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200/
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD} # Defined in your .env
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none # Since you use self-signed certs
      - SERVER_BASEPATH="/kibana"
      - SERVER_REWRITEBASEPATH="true"
      - NODE_OPTIONS="--max-old-space-size=256" # Limite stricte pour l'interface web Kibana
    depends_on:
      - elasticsearch
    restart: always
    logging: *default-logging
    # On expose pas le port 5601 sur le net on passe par le 443
    networks:
      - monitor_net

  logstash:
    build: ./logstash
    container_name: logstash
    env_file: .env
    volumes:
      - ./certs:/usr/share/logstash/config/certs
      - ./logs/nginx:/var/log/nginx:ro
    environment:
      - MONITORING_ENABLED=false
      - XPACK_MONITORING_ENABLED=false
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m" # Logstash n'a pas besoin de plus pour de petits projets
      - PIPELINE_WORKERS=1 # Force Logstash à ne pas utiliser plusieurs cœurs CPU
      - PIPELINE_BATCH_SIZE=50
    depends_on:
      - elasticsearch
    logging: *default-logging
    networks:
      - monitor_net
      - backend_net
    restart: always
volumes:
  grafana_data:
  elastic_data:
  redis_data:
  shared_assets:
  vault-data:
