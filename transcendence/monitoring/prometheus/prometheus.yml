global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    metrics_path: '/prometheus/metrics'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
  
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
  
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

