# default_server : une seule conf HTTPS — accepte localhost, IP LAN ou nom de domaine
# (évite de devoir dupliquer server_name à chaque changement d’hôte).


server {
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    http2 on;
    server_name ${NGINX_SERVER_NAME};

    ssl_certificate /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Desactiver car c'est gérer autre part donc ça crée un conflit
    # modsecurity on;
    # modsecurity_rules_file /etc/modsecurity.d/setup.conf;

    # API backend
    location /api/ {
        # O@TODO Cloe exposer les routes de l'api plutot que de off le firewall -> modsecurity activé par defaut btw
        # modsecurity on;
        # modsecurity_rules_file /etc/modsecurity.d/setup.conf;
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8443;
    }

    # Django (admin pannel)
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Django Channels)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Media files (avatars, uploads)
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Shared assets (PDF exports, etc.)
    location /shared/ {
        alias /var/www/html/shared/;
        add_header Content-Disposition "attachment"; # Force download
        try_files $uri $uri/ =404;
    }

    # Pieces / tiles / manifests / UI images
    location ~* ^/(chess|imgs)/ {
        proxy_pass https://frontend:5173;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_frontend/frontend.crt;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Vite build assets
    location ~* ^/assets/.+\.(js|css|mjs)$ {
        proxy_pass https://frontend:5173;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_frontend/frontend.crt;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }


    # Pages légales statiques — avant location / pour ne pas être absorbé par le proxy Vite (HTML + legal.css).
    location ^~ /legal/ {
        alias /var/www/html/legal/;
        index privacy.html;
        try_files $uri $uri/ =404;
    }

    # Frontend (Vite)
    location / {
        proxy_pass https://frontend:5173;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_frontend/frontend.crt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_connect_timeout 60s;
        proxy_read_timeout 86400s;
        # proxy_send_timeout 60s;
        proxy_buffering off;
    }

    location /elasticsearch/ {

        # modsecurity off;
        proxy_pass https://elasticsearch:9200/;
        proxy_ssl_verify off;
        proxy_ssl_trusted_certificate /etc/nginx/certs_elastic/elasticsearch.crt;
        proxy_ssl_server_name on;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kibana/ {
        # modsecurity est activé globalement, les exclusions sont dans api-rules.conf
        proxy_pass https://kibana:5601;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_kibana/kibana.crt;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        proxy_pass https://grafana:3000;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_grafana/grafana.crt;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
    }

    location /prometheus/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
        proxy_pass https://prometheus:9090/prometheus/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/nginx/certs_prometheus/prometheus.crt;
        proxy_set_header Host $http_host;
    }

    location /statut {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #healthcheck
    # location /statut {
    #     stub_status on;
    #     modsecurity off;
    #     access_log off;
        
    #     allow 127.0.0.1;
    #     allow 172.16.0.0/12;
    #     # deny all;
    # }
}
